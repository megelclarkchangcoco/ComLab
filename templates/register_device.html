<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Device</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">


<style>
    :root {
    --primary: #007bff;
}
    body {
        font-family: 'Roboto', sans-serif;
        background-color: #f0f2f5;
        color: #343a40;
    }

    /* HEADER */
    .header-bar {
         display:flex; justify-content:space-between; align-items:center;
        background:var(--primary); color:white; padding:18px 45px;
        border-radius:16px; margin-bottom:45px;
        box-shadow:0 6px 25px rgba(0,0,0,0.25);
    }

    .header-title {
        font-size: 1.5rem;
        font-weight: 600;
    }

    .header-buttons {display:flex; gap:12px;}
    .header-buttons .btn {
        background:white; color:var(--primary);
        border:none; padding:10px 20px; border-radius:10px;
        cursor:pointer; font-weight:600; transition:0.25s;
        display:flex; align-items:center; gap:8px;
        box-shadow:0 2px 6px rgba(0,0,0,0.15);
    }
    .header-buttons .btn:hover {background:#e7f1ff; transform:translateY(-2px);}



    /* CENTER CONTAINER */
    .container {
        display: flex;
        justify-content: center;
        margin-top: 70px;
    }

    form {
        background: white;
        width: 360px;
        padding: 35px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        animation: fadeIn 0.4s ease;
    }

    h2 {
        margin-top: 0;
        margin-bottom: 20px;
        color: #007bff;
        font-size: 24px;
        font-weight: bold;
    }

    input, select {
        padding: 12px;
        width: 90%;
        margin: 10px 0;
        border: 1px solid #007bff;
        border-radius: 6px;
        font-size: 15px;
    }

    button {
        background: #007bff;
        color: white;
        font-size: 16px;
        padding: 12px 20px;
        border: none;
        width: 100%;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 10px;
    }
    button:hover {
        background: #0056b3;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<!-- HEADER -->
    <div class="header-bar">
        <div class="header-title"><i class="fa fa-laptop" aria-hidden="true"></i>
Device Registration</div>
        <div class="header-buttons print-hide">
            <button class="btn btn-secondary" onclick="window.location.href='/admin'">
                <i class="fas fa-home"></i> Dashboard
            </button>
        </div>
    </div>
<body>
<!-- FORM -->
<div class="container">
    <form method="POST">
        <h2><i class="fa fa-laptop" aria-hidden="true"></i>
 Register New Device</h2>

        <label>PC Tag:</label><br>
        <input type="text" name="tag" placeholder="Enter PC Tag" required><br>

        <label>ComLab Location:</label><br>
        <select name="location" required>
            <option value="">-- Select ComLab --</option>
            {% for lab in comlabs %}
                <option value="{{ lab[0] }}">{{ lab[1] }}</option>
            {% endfor %}
        </select>

        <button type="submit">Register Device</button>
    </form>
</div>

</body>
</html>
