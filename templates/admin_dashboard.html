<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard - ComLabs</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>

@keyframes fadeIn { from { opacity:0;} to {opacity:1;} }

:root {
    --primary:#007bff;
    --success:#28a745;
    --danger:#dc3545;
    --warning:#ffc107;
    --gray:#6c757d;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#edf1f7;
    margin:0;
    padding:20px;
    text-align:center;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--primary);
    color:white;
    padding:18px 45px;
    border-radius:16px;
    margin-bottom:45px;
    box-shadow:0 6px 25px rgba(0,0,0,0.25);
}

header h2{
    margin:0;
    font-size:24px;
    letter-spacing:0.5px;
}

.menu-buttons{
    display:flex;
    gap:12px;
}

.menu-buttons button{
    background:white;
    color:var(--primary);
    border:none;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    transition:0.25s;
    display:flex;
    align-items:center;
    gap:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.menu-buttons button:hover{
    background:#e7f1ff;
    transform:translateY(-2px);
}

/* NOTIFICATION BELL */
#notif-wrapper{
    position:relative;
}

#notif-button{
    position:relative;
    width:46px;
    height:46px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    background:rgba(255,255,255,0.18);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:0.25s;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

#notif-button:hover,
#notif-button.active{
    background:white;
    color:var(--primary);
    transform:translateY(-2px);
}

#notif-icon{
    font-size:21px;
}

#notif-badge{
    position:absolute;
    top:-6px;
    right:-7px;
    min-width:20px;
    height:20px;
    padding:0 5px;
    background:#dc3545;
    color:white;
    font-size:11px;
    font-weight:800;
    border-radius:999px;
    display:none;
    align-items:center;
    justify-content:center;
    border:2px solid var(--primary);
}

#notif-button.has-unread{
    animation:notifPulse 1.4s infinite;
}

@keyframes notifPulse{
    0%{box-shadow:0 0 0 0 rgba(220,53,69,.55);}
    70%{box-shadow:0 0 0 9px rgba(220,53,69,0);}
    100%{box-shadow:0 0 0 0 rgba(220,53,69,0);}
}

/* DROPDOWN PANEL */
#notif-panel{
    position:absolute;
    right:0;
    top:56px;
    width:370px;
    background:white;
    border-radius:16px;
    box-shadow:0 14px 35px rgba(0,0,0,0.25);
    text-align:left;
    padding:0;
    display:none;
    max-height:440px;
    overflow:hidden;
    animation:fadeIn .2s ease-out;
    z-index:9999;
}

.notif-panel-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:14px 16px;
    border-bottom:1px solid #e5e7eb;
    background:#f8fbff;
}

.notif-panel-title{
    font-size:15px;
    font-weight:800;
    color:#111827;
}

.notif-clear-btn{
    border:none;
    background:#eef4ff;
    color:var(--primary);
    border-radius:8px;
    padding:6px 10px;
    cursor:pointer;
    font-size:12px;
    font-weight:800;
}

.notif-clear-btn:hover{
    background:#dbeafe;
}

#notif-list{
    max-height:370px;
    overflow-y:auto;
}

.notif-item{
    padding:13px 15px;
    border-bottom:1px solid #edf0f5;
    display:flex;
    gap:11px;
    align-items:flex-start;
}

.notif-item:last-child{
    border-bottom:none;
}

.notif-item.unread{
    background:#fff7f7;
}

.notif-item.unread .notif-title::after{
    content:"New";
    margin-left:8px;
    background:#dc3545;
    color:white;
    font-size:10px;
    padding:2px 6px;
    border-radius:999px;
    vertical-align:middle;
}

.notif-item-icon{
    width:34px;
    height:34px;
    border-radius:10px;
    background:#eef4ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    flex-shrink:0;
}

.notif-text{
    font-size:15px;
    color:#333;
    font-weight:500;
    flex:1;
}

.notif-clickable{
    cursor:pointer;
    transition:0.2s;
}

.notif-clickable:hover{
    background:#f3f7ff;
}

.notif-title{
    font-size:15px;
    font-weight:800;
    color:#111827;
    margin-bottom:5px;
    text-transform:capitalize;
}

.notif-line{
    font-size:13px;
    color:#374151;
    line-height:1.45;
}

.notif-time{
    font-size:12px;
    color:#6b7280;
    margin-top:5px;
}

.notif-empty{
    padding:22px 15px;
    color:#667085;
    font-size:14px;
    text-align:center;
}

/* ACTION BUTTONS */
.action-area{
    margin-bottom:35px;
    display:flex;
    justify-content:center;
    gap:15px;
}

.action-btn{
    padding:12px 22px;
    font-weight:600;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:0.25s;
    box-shadow:0 3px 10px rgba(0,0,0,0.18);
    display:flex;
    align-items:center;
    gap:8px;
}

.action-btn.add{
    background:var(--success);
    color:white;
}

.action-btn.add:hover{
    background:#1f8a37;
}

.action-btn.edit{
    background:var(--warning);
    color:white;
}

.action-btn.edit:hover{
    background:#e0a800;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:38px;
    max-width:1200px;
    margin:0 auto;
}

.comlab-box{
    background:white;
    border-radius:18px;
    padding:32px 20px 85px;
    position:relative;
    transition:0.35s;
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
}

.comlab-box.clickable{
    cursor:pointer;
}

.comlab-box:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 32px rgba(0,0,0,0.22);
}

.comlab-box img{
    width:75%;
    margin-bottom:18px;
    filter:drop-shadow(0 5px 6px rgba(0,0,0,0.18));
}

.comlab-box p{
    margin:0;
    font-size:17px;
    font-weight:600;
    color:#2b2b2b;
}

.go-btn{
    position:absolute;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 20px;
    background:var(--primary);
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    opacity:0;
    transition:0.35s;
}

.comlab-box:hover .go-btn{
    opacity:1;
    transform:translate(-50%,-4px);
}

/* EDIT MODE */
.edit-actions{
    position:absolute;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
}

.edit-btn{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.2em;
}

.edit-btn.rename{
    background:var(--warning);
}

.edit-btn.remove{
    background:var(--danger);
    color:white;
}

.edit-btn.cancel{
    background:var(--gray);
    color:white;
}

</style>
</head>

<body>

<header>
    <h2><i class="fa fa-desktop"></i> Computer Laboratory Management</h2>

    <div style="display:flex; align-items:center; gap:20px;">
        <div id="notif-wrapper">
            <button id="notif-button" type="button" title="Notifications">
                <i id="notif-icon" class="fas fa-bell"></i>
                <span id="notif-badge">0</span>
            </button>

            <div id="notif-panel">
                <div class="notif-panel-header">
                    <div class="notif-panel-title"><i class="fas fa-bell"></i> Notifications</div>
                    <button type="button" class="notif-clear-btn" onclick="clearNotifications(event)">Clear</button>
                </div>
                <div id="notif-list"></div>
            </div>
        </div>

        <div class="menu-buttons">
            <button onclick="location.href='/admin'">
                <i class="fas fa-home"></i> Dashboard
            </button>

            <!--
            <button onclick="openEmergencyModal()"
                    style="background:#dc3545;color:white;border:none;padding:10px 18px;border-radius:10px;
                    font-weight:600;cursor:pointer;">
                <i class="fas fa-user-slash"></i> Logout Requests
            </button>
            -->

            <button onclick="location.href='/account-management'">
                <i class="fas fa-user-cog"></i> Account Management
            </button>

            <button onclick="location.href='/generate_link'">
                <i class="fas fa-plus"></i> Add Device
            </button>

            <button onclick="location.href='/logout'">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</header>

<div class="action-area">
    <button class="action-btn add" onclick="addLab()">
        <i class="fas fa-plus"></i> Add Computer Lab
    </button>

    <button class="action-btn edit" onclick="editLab()">
        <i class="fas fa-edit"></i> Edit / Remove
    </button>
</div>

<div class="grid">
{% for lab in labs %}

    {% if not edit_mode %}
    <div class="comlab-box clickable" onclick="goToInventory('{{ lab[0] }}')">
    {% else %}
    <div class="comlab-box">
    {% endif %}

        <img src="https://its.lmu.edu/media/its/computer%20lab%20icon-400x400.png">
        <p>{{ lab[1] }}</p>

        {% if not edit_mode %}
        <button class="go-btn" onclick="event.stopPropagation(); goToInventory('{{ lab[0] }}')">
            Enter <i class="fa fa-arrow-right"></i>
        </button>
        {% else %}
        <div class="edit-actions">
            <button class="edit-btn rename" onclick="renameLab({{ lab[0] }}, {{ lab[1]|tojson }})">
                <i class="fas fa-pencil-alt"></i>
            </button>

            <button class="edit-btn remove" onclick="removeLab({{ lab[0] }})">
                <i class="fas fa-trash-alt"></i>
            </button>

            <button class="edit-btn cancel" onclick="location.href='/admin'">
                <i class="fas fa-times"></i>
            </button>
        </div>
        {% endif %}
    </div>

{% endfor %}
</div>

<!-- EMERGENCY LOGOUT MODAL -->
<div id="emergencyModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); backdrop-filter:blur(3px);
            align-items:center; justify-content:center; z-index:99999;">

    <div style="width:420px; background:white; padding:25px; border-radius:14px;
                box-shadow:0 8px 25px rgba(0,0,0,0.25); animation:fadeIn .2s ease;">

        <h3 style="margin-top:0; margin-bottom:15px; text-align:center;">
            <i class="fas fa-user-clock"></i> Emergency Logout Requests
        </h3>

        <div id="emergencyList" style="max-height:300px; overflow-y:auto; border:1px solid #ddd;
                                       border-radius:10px; padding:10px;">
            Loading requests...
        </div>

        <div style="text-align:right; margin-top:15px;">
            <button onclick="closeEmergencyModal()"
                    style="background:#6c757d; color:white; padding:8px 15px; border:none;
                           border-radius:8px;">
                Close
            </button>
        </div>
    </div>
</div>

<script>
function goToInventory(labId) {
    window.location.href = `/comlab/${labId}/inventory`;
}

function openEmergencyModal() {
    const modal = document.getElementById("emergencyModal");
    modal.style.display = "flex";

    fetch("/admin/get_emergency_requests")
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById("emergencyList");
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666;">No pending requests</p>`;
                return;
            }

            data.forEach(req => {
                container.innerHTML += `
                    <div style="padding:10px; border-bottom:1px solid #eee;">
                        <b>User:</b> ${req.student_id}<br>
                        <b>Time:</b> ${req.timestamp}<br><br>

                        <button onclick="approveLogout(${req.id})"
                                style="background:#28a745; color:white; border:none;
                                       padding:6px 12px; border-radius:6px; margin-right:5px;">
                            Approve
                        </button>

                        <button onclick="declineLogout(${req.id})"
                                style="background:#dc3545; color:white; border:none;
                                       padding:6px 12px; border-radius:6px;">
                            Decline
                        </button>
                    </div>
                `;
            });
        });
}

function closeEmergencyModal() {
    document.getElementById("emergencyModal").style.display = "none";
}

function approveLogout(id) {
    if (!confirm("Approve logout request?")) return;

    fetch(`/admin/approve_logout/${id}`)
        .then(r => r.text())
        .then(msg => {
            alert(msg);
            openEmergencyModal();
        });
}

function declineLogout(id) {
    if (!confirm("Decline this logout request?")) return;

    fetch(`/admin/decline_logout/${id}`)
        .then(r => r.text())
        .then(msg => {
            alert(msg);
            openEmergencyModal();
        });
}
</script>

<script>
// ------------------- WORKING NOTIFICATION SYSTEM -------------------
// Backend must send JSON from /alerts/latest and /alerts/stream.

let notifList = [];
let readAlertIds = JSON.parse(localStorage.getItem("comlab_read_alert_ids") || "[]").map(String);

const notifButton = document.getElementById("notif-button");
const notifBadge = document.getElementById("notif-badge");
const notifPanel = document.getElementById("notif-panel");
const notifListBox = document.getElementById("notif-list");

function getAlertIcon(alertType) {
    alertType = (alertType || "").toLowerCase();

    if (alertType === "missing") return "🕵️";
    if (alertType === "faulty") return "⚠️";
    if (alertType === "replaced") return "🔄";

    return "🚨";
}

function escapeHTML(value) {
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function saveReadAlertIds() {
    localStorage.setItem("comlab_read_alert_ids", JSON.stringify(readAlertIds));
}

function isUnread(alertId) {
    return !readAlertIds.includes(String(alertId));
}

function getUnreadCount() {
    return notifList.filter(n => isUnread(n.id)).length;
}

function normalizeAlert(raw) {
    return {
        id: String(raw.id),
        alert_type: raw.alert_type || "alert",
        device: raw.device || raw.serial_number || "Unknown Device",
        comlab_id: raw.comlab_id || raw.location || "Unknown",
        pc: raw.pc || raw.device_name || "Unknown PC",
        user: raw.user || raw.user_id || "No active user",
        timestamp: raw.timestamp || ""
    };
}

function addNotification(rawAlert, markAsUnread = true) {
    if (!rawAlert || !rawAlert.id) return;

    const alertData = normalizeAlert(rawAlert);
    const exists = notifList.some(n => String(n.id) === String(alertData.id));

    if (exists) return;

    notifList.unshift(alertData);

    if (!markAsUnread && !readAlertIds.includes(String(alertData.id))) {
        readAlertIds.push(String(alertData.id));
        saveReadAlertIds();
    }

    if (notifList.length > 30) {
        notifList = notifList.slice(0, 30);
    }

    renderNotifications();
}

function renderNotifications() {
    notifListBox.innerHTML = "";

    if (notifList.length === 0) {
        notifListBox.innerHTML = `<div class="notif-empty">No alerts yet</div>`;
    } else {
        notifList.forEach(n => {
            const icon = getAlertIcon(n.alert_type);
            const alertTitle = escapeHTML(n.alert_type || "Alert");
            const device = escapeHTML(n.device || "Unknown Device");
            const comlab = escapeHTML(n.comlab_id || "Unknown");
            const pc = escapeHTML(n.pc || "Unknown PC");
            const user = escapeHTML(n.user || "No active user");
            const timestamp = escapeHTML(n.timestamp || "");
            const unreadClass = isUnread(n.id) ? "unread" : "";

            notifListBox.innerHTML += `
                <div class="notif-item notif-clickable ${unreadClass}" onclick="openAlertsPage('${comlab}')">
                    <div class="notif-item-icon">${icon}</div>

                    <div class="notif-text">
                        <div class="notif-title">${alertTitle}</div>
                        <div class="notif-line"><b>Device:</b> ${device}</div>
                        <div class="notif-line"><b>ComLab:</b> ${comlab}</div>
                        <div class="notif-line"><b>PC:</b> ${pc}</div>
                        <div class="notif-line"><b>User:</b> ${user}</div>
                        ${timestamp ? `<div class="notif-time">${timestamp}</div>` : ""}
                    </div>
                </div>
            `;
        });
    }

    const unreadCount = getUnreadCount();

    if (unreadCount > 0) {
        notifBadge.innerText = unreadCount > 99 ? "99+" : unreadCount;
        notifBadge.style.display = "flex";
        notifButton.classList.add("has-unread");
    } else {
        notifBadge.style.display = "none";
        notifButton.classList.remove("has-unread");
    }
}

function openAlertsPage(comlabId) {
    window.location.href = `/comlab/${comlabId}/inventory/view_alerts`;
}

function markCurrentAlertsAsRead() {
    notifList.forEach(n => {
        const alertId = String(n.id);

        if (!readAlertIds.includes(alertId)) {
            readAlertIds.push(alertId);
        }
    });

    saveReadAlertIds();
    renderNotifications();
}

function clearNotifications(event) {
    if (event) event.stopPropagation();

    notifList.forEach(n => {
        const alertId = String(n.id);

        if (!readAlertIds.includes(alertId)) {
            readAlertIds.push(alertId);
        }
    });

    notifList = [];
    saveReadAlertIds();
    renderNotifications();
}

notifButton.addEventListener("click", function(event) {
    event.stopPropagation();

    const isOpen = notifPanel.style.display === "block";
    notifPanel.style.display = isOpen ? "none" : "block";
    notifButton.classList.toggle("active", !isOpen);

    if (!isOpen) {
        markCurrentAlertsAsRead();
    }
});

document.addEventListener("click", function(event) {
    if (!event.target.closest("#notif-wrapper")) {
        notifPanel.style.display = "none";
        notifButton.classList.remove("active");
    }
});

function loadLatestNotifications() {
    fetch("/alerts/latest")
        .then(response => response.json())
        .then(data => {
            notifList = [];

            if (data.success && Array.isArray(data.alerts)) {
                data.alerts.forEach(alertData => addNotification(alertData, true));
            }

            renderNotifications();
        })
        .catch(error => {
            console.error("Failed to load notifications:", error);
            renderNotifications();
        });
}

function startNotificationStream() {
    const evtSource = new EventSource("/alerts/stream");

    evtSource.onmessage = function(e) {
        try {
            const alertData = JSON.parse(e.data);
            addNotification(alertData, true);
        } catch (error) {
            console.error("Invalid alert data from /alerts/stream:", e.data);
        }
    };

    evtSource.onerror = function(error) {
        console.error("Notification stream connection error:", error);
    };
}

loadLatestNotifications();
startNotificationStream();
</script>

<script>
function addLab(){
    const name = prompt("Enter Lab Name:");

    if(!name) return;

    fetch("/add_lab", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({lab_name:name})
    })
    .then(r => r.json())
    .then(d => {
        alert(d.message);
        location.reload();
    });
}

function editLab(){
    location.href="/admin?edit=1";
}

function renameLab(id, currentName){
    const newName = prompt("Rename Lab:", currentName);

    if(!newName || !newName.trim()) return;

    fetch("/rename_lab", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            id:id,
            new_name:newName
        })
    })
    .then(r => r.json())
    .then(d => {
        alert(d.message);
        location.reload();
    });
}

function removeLab(id){
    if(!confirm("Are you sure you want to delete this lab?")) return;

    fetch("/remove_lab", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:id})
    })
    .then(r => r.json())
    .then(d => {
        alert(d.message);
        location.reload();
    });
}
</script>

</body>
</html>
