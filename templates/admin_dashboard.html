<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard - ComLabs</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

<style>

@keyframes fadeIn { from { opacity:0;} to {opacity:1;} }

:root {
    --primary:#007bff;
    --success:#28a745;
    --danger:#dc3545;
    --warning:#ffc107;
    --gray:#6c757d;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:#edf1f7;
    margin:0;
    padding:20px;
    text-align:center;
}

header{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--primary);color:white;padding:18px 45px;
    border-radius:16px;margin-bottom:45px;
    box-shadow:0 6px 25px rgba(0,0,0,0.25);
}
header h2{margin:0;font-size:24px;letter-spacing:0.5px;}

.menu-buttons{display:flex;gap:12px;}
.menu-buttons button{
    background:white;color:var(--primary);
    border:none;padding:10px 20px;border-radius:10px;
    cursor:pointer;font-weight:600;transition:0.25s;
    display:flex;align-items:center;gap:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.15);
}
.menu-buttons button:hover{background:#e7f1ff;transform:translateY(-2px);}

/* NOTIFICATION ICON */
#notif-wrapper{
    position:relative;
}

#notif-icon{
    font-size:26px;
    cursor:pointer;
    color:white;
    margin-left:20px;
}

#notif-badge{
    position:absolute;
    top:-4px;
    right:-6px;
    background:red;
    color:white;
    font-size:11px;
    padding:2px 6px;
    border-radius:50%;
}

/* DROPDOWN PANEL */
#notif-panel{
    position:absolute;
    right:0;
    top:38px;
    width:320px;
    background:white;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.20);
    text-align:left;
    padding:0;
    display:none;
    max-height:400px;
    overflow-y:auto;
    animation:fadeIn .2s ease-out;
    z-index:9999;
}

.notif-item{
    padding:12px 15px;
    border-bottom:1px solid #ddd;
    display:flex;
    gap:10px;
    align-items:flex-start;
}
.notif-item:last-child{
    border-bottom:none;
}
.notif-icon{
    font-size:20px;
}
.notif-text{
    font-size:15px;
    color:#333;
    font-weight:500;
}

/* ACTION BUTTONS */
.action-area{
    margin-bottom:35px;display:flex;justify-content:center;gap:15px;
}
.action-btn{
    padding:12px 22px;font-weight:600;border-radius:12px;border:none;
    cursor:pointer;transition:0.25s;box-shadow:0 3px 10px rgba(0,0,0,0.18);
    display:flex;align-items:center;gap:8px;
}
.action-btn.add{background:var(--success);color:white;}
.action-btn.add:hover{background:#1f8a37;}

.action-btn.edit{background:var(--warning);color:white;}
.action-btn.edit:hover{background:#e0a800;}

/* GRID */
.grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:38px;max-width:1200px;margin:0 auto;
}
.comlab-box{
    background:white;border-radius:18px;padding:32px 20px 85px;
    position:relative;transition:0.35s;
    box-shadow:0 6px 20px rgba(0,0,0,0.12);
}
.comlab-box:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 32px rgba(0,0,0,0.22);
}

.comlab-box img{
    width:75%;margin-bottom:18px;filter:drop-shadow(0 5px 6px rgba(0,0,0,0.18));
}
.comlab-box p{margin:0;font-size:17px;font-weight:600;color:#2b2b2b;}

.go-btn{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    padding:10px 20px;background:var(--primary);color:white;
    border:none;border-radius:10px;cursor:pointer;font-weight:600;
    opacity:0;transition:0.35s;
}
.comlab-box:hover .go-btn{
    opacity:1;transform:translate(-50%,-4px);
}

/* EDIT MODE */
.edit-actions{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;
}
.edit-btn{
    padding:10px;border:none;border-radius:10px;cursor:pointer;
    width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:1.2em;
}
.edit-btn.rename{background:var(--warning);}
.edit-btn.remove{background:var(--danger);color:white;}
.edit-btn.cancel{background:var(--gray);color:white;}

</style>
</head>
<body>

<header>
    <h2><i class="fa fa-desktop"></i> Computer Laboratory Management</h2>

    <div style="display:flex; align-items:center; gap:20px;">
        <div id="notif-wrapper">
            <i id="notif-icon" class="fas fa-triangle-exclamation"></i>
            <span id="notif-badge" style="display:none">0</span>

            <div id="notif-panel"></div>
        </div>

        <div class="menu-buttons">
            <button onclick="location.href='/admin'"><i class="fas fa-home"></i> Dashboard</button>
            <button onclick="openEmergencyModal()"
        style="background:#dc3545;color:white;border:none;padding:10px 18px;border-radius:10px;
               font-weight:600;cursor:pointer;">
    <i class="fas fa-user-slash"></i>Logout Requests
</button>

            <button onclick="location.href='/account-management'"><i class="fas fa-user-cog"></i> Account Management</button>
            <button onclick="location.href='/generate_link'"><i class="fas fa-plus"></i> Add Device</button>
            <button onclick="location.href='/logout'"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</header>


<div class="action-area">
    <button class="action-btn add" onclick="addLab()"><i class="fas fa-plus"></i> Add Computer Lab</button>
    <button class="action-btn edit" onclick="editLab()"><i class="fas fa-edit"></i> Edit / Remove</button>
</div>


<div class="grid">
{% for lab in labs %}
    <div class="comlab-box">
        <img src="https://its.lmu.edu/media/its/computer%20lab%20icon-400x400.png">
        <p>{{ lab[1] }}</p>

        {% if not edit_mode %}
        <button class="go-btn" onclick="location.href='/comlab/{{ lab[0] }}'">Enter <i class="fa fa-arrow-right"></i></button>
        {% else %}
        <div class="edit-actions">
            <button class="edit-btn rename" onclick="renameLab({{ lab[0] }}, '{{ lab[1] }}')"><i class="fas fa-pencil-alt"></i></button>
            <button class="edit-btn remove" onclick="removeLab({{ lab[0] }})"><i class="fas fa-trash-alt"></i></button>
            <button class="edit-btn cancel" onclick="location.href='/admin'"><i class="fas fa-times"></i></button>
        </div>
        {% endif %}
    </div>
{% endfor %}
</div>
<!-- EMERGENCY LOGOUT MODAL -->
<div id="emergencyModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.5); backdrop-filter:blur(3px);
            align-items:center; justify-content:center; z-index:99999;">

    <div style="width:420px; background:white; padding:25px; border-radius:14px;
                box-shadow:0 8px 25px rgba(0,0,0,0.25); animation:fadeIn .2s ease;">

        <h3 style="margin-top:0; margin-bottom:15px; text-align:center;">
            <i class="fas fa-user-clock"></i> Emergency Logout Requests
        </h3>

        <div id="emergencyList" style="max-height:300px; overflow-y:auto; border:1px solid #ddd;
                                       border-radius:10px; padding:10px;">
            Loading requests...
        </div>

        <div style="text-align:right; margin-top:15px;">
            <button onclick="closeEmergencyModal()"
                    style="background:#6c757d; color:white; padding:8px 15px; border:none;
                           border-radius:8px;">Close</button>
        </div>
    </div>
</div>
<script>
function openEmergencyModal() {
    const modal = document.getElementById("emergencyModal");
    modal.style.display = "flex";

    fetch("/admin/get_emergency_requests")
        .then(r => r.json())
        .then(data => {
            const container = document.getElementById("emergencyList");
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#666;">No pending requests</p>`;
                return;
            }

            data.forEach(req => {
            container.innerHTML += `
                        <div style="padding:10px; border-bottom:1px solid #eee;">
                            <b>User:</b> ${req.student_id}<br>
                            <b>Time:</b> ${req.timestamp}<br><br>

                            <button onclick="approveLogout(${req.id})"
                                    style="background:#28a745; color:white; border:none;
                                           padding:6px 12px; border-radius:6px; margin-right:5px;">
                                Approve
                            </button>

                            <button onclick="declineLogout(${req.id})"
                                    style="background:#dc3545; color:white; border:none;
                                           padding:6px 12px; border-radius:6px;">
                                Decline
                            </button>
                        </div>
                    `;

            });
        });
}

function closeEmergencyModal() {
    document.getElementById("emergencyModal").style.display = "none";
}

function approveLogout(id) {
    if (!confirm("Approve logout request?")) return;

    fetch(`/admin/approve_logout/${id}`)
        .then(r => r.text())
        .then(msg => {
            alert(msg);
            openEmergencyModal(); // refresh modal
        });
}


    function declineLogout(id) {
    if (!confirm("Decline this logout request?")) return;

    fetch(`/admin/decline_logout/${id}`)
        .then(r => r.text())
        .then(msg => {
            alert(msg);
            openEmergencyModal(); // refresh list after decline
        });
}

</script>

<script>
// ------------------- NOTIFICATION SYSTEM -------------------

let notifList = JSON.parse(localStorage.getItem("alerts") || "[]");
let lastCleared = localStorage.getItem("alerts_cleared") === "1";

// ------------ RENDER UI ----------------
function renderNotifications() {
    const panel = document.getElementById("notif-panel");
    const badge = document.getElementById("notif-badge");

    panel.innerHTML = "";


    if (notifList.length === 0) {
        panel.innerHTML += `<div class="notif-item"><div class="notif-text">No alerts</div></div>`;
        badge.style.display = "none";
        return;
    }

    // SHOW ALERT ITEMS
    notifList.forEach(n => {
        panel.innerHTML += `
            <div class="notif-item notif-clickable" onclick="openAlertsPage(${n.comlab_id})">
                <div class="notif-icon">⚠️</div>
                <div class="notif-text">${n.text}</div>
            </div>
        `;
    });

    // SHOW BADGE ONLY IF NOT CLEARED
    if (!lastCleared) {
        badge.innerText = notifList.length;
        badge.style.display = "inline-block";
    } else {
        badge.style.display = "none";
    }
}

// ---------- CLICK ALERT → OPEN FLASK ROUTE ----------
function openAlertsPage(comlab_id) {
    window.location.href = `/comlab/${comlab_id}/inventory/view_alerts`;
}

// -------------- CLEAR ALL ----------------
function markAllRead() {
    lastCleared = true;
    localStorage.setItem("alerts_cleared", "1");

    notifList = [];
    localStorage.setItem("alerts", JSON.stringify(notifList));

    renderNotifications();
}

// -------------- TOGGLE DROPDOWN --------------
document.getElementById("notif-icon").onclick = () => {
    const panel = document.getElementById("notif-panel");

    panel.style.display = (panel.style.display === "block") ? "none" : "block";

    // AUTO-CLEAR COUNT WHEN OPENED
    lastCleared = true;
    localStorage.setItem("alerts_cleared", "1");

    renderNotifications();
};

// ---------- SSE EVENT LISTENER -------------
const evtSource = new EventSource("/alerts/stream");

evtSource.onmessage = function(e) {
    const [comlab_id, serial, alert_type] = e.data.split("|");

    let text = "";
    if(alert_type === "faulty") text = `Device ${serial} is FAULTY`;
    if(alert_type === "missing") text = `Device ${serial} is MISSING more than 10 minutes`;
    if(alert_type === "replaced") text = `Device ${serial} is being REPLACED`;

    // Add only if not duplicate
    const exists = notifList.some(n => n.text === text && n.comlab_id == comlab_id);
    if (!exists) {
        notifList.unshift({comlab_id: comlab_id, text: text});
        localStorage.setItem("alerts", JSON.stringify(notifList));
        lastCleared = false;
        localStorage.setItem("alerts_cleared", "0");
    }

    renderNotifications();
};

// Initial load
renderNotifications();
</script>

<script>
function addLab(){
    const name = prompt("Enter Lab Name:");
    if(!name) return;
    fetch("/add_lab",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({lab_name:name})})
    .then(r=>r.json()).then(d=>{alert(d.message);location.reload();});
}

function editLab(){ location.href="/admin?edit=1"; }

function renameLab(id,currentName){
    const newName=prompt("Rename Lab:",currentName);
    if(!newName||!newName.trim())return;
    fetch("/rename_lab",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:id,new_name:newName})})
    .then(r=>r.json()).then(d=>{alert(d.message);location.reload();});
}

function removeLab(id){
    if(!confirm("Are you sure you want to delete this lab?"))return;
    fetch("/remove_lab",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id:id})})
    .then(r=>r.json()).then(d=>{alert(d.message);location.reload();});
}
</script>

</body>
</html>
